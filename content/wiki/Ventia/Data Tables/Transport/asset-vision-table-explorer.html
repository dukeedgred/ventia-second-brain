<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asset Vision Table Explorer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #171a1f;
      --panel-2: #20242b;
      --line: #333942;
      --muted: #9aa5b1;
      --text: #eef2f5;
      --soft: #c7d0d8;
      --accent: #5cc8b2;
      --accent-2: #f2b84b;
      --danger: #e86f6f;
      --good: #7fd17f;
      --info: #7fa8ff;
      --purple: #c795ff;
      --chip: #262b33;
      --focus: #f5d779;
      --shadow: rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .app-shell { min-height: 100vh; display: grid; grid-template-rows: auto auto 1fr; }
    header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid var(--line);
      background: #121519;
    }
    .topline { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    h1 { margin: 0; font-size: 24px; line-height: 1.15; font-weight: 760; letter-spacing: 0; }
    .subtitle { margin: 8px 0 0; color: var(--soft); max-width: 1120px; }
    .meta { color: var(--muted); font-size: 12px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .meta span, .badge, .pill {
      background: var(--chip);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px 8px;
      white-space: nowrap;
    }
    nav.toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(16,18,20,.96);
      box-shadow: 0 8px 22px var(--shadow);
    }
    .toolbar-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .search {
      min-width: 260px;
      flex: 1 1 360px;
      color: var(--text);
      background: #0c0f12;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      outline: none;
    }
    .search:focus, select:focus, button:focus { outline: 2px solid var(--focus); outline-offset: 1px; }
    select {
      color: var(--text);
      background: #0c0f12;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      max-width: 100%;
    }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .tab-btn, .small-btn {
      border: 1px solid var(--line);
      color: var(--soft);
      background: var(--panel-2);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .tab-btn.active, .small-btn.active { color: #05110f; background: var(--accent); border-color: var(--accent); font-weight: 700; }
    .context-filters { display: flex; gap: 6px; flex-wrap: wrap; }
    .check-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--soft);
      background: var(--chip);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
    }
    .check-chip input { accent-color: var(--accent); }
    main { padding: 18px 24px 32px; }
    .grid { display: grid; gap: 14px; }
    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 30px var(--shadow);
      overflow: hidden;
    }
    .panel-header {
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .panel-header h2, .panel-header h3 { margin: 0; font-size: 16px; letter-spacing: 0; }
    .panel-body { padding: 14px; }
    .metric { padding: 14px; }
    .metric .value { font-size: 28px; font-weight: 780; line-height: 1.1; }
    .metric .label { color: var(--muted); margin-top: 5px; }
    .text-muted { color: var(--muted); }
    .note { color: var(--soft); }
    .callout {
      border-left: 4px solid var(--accent-2);
      background: #211b10;
      padding: 12px 14px;
      border-radius: 8px;
      color: #f6e6c5;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 9px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 12px; font-weight: 700; background: #15181d; position: sticky; top: 0; z-index: 1; }
    tr:hover td { background: #1b2027; }
    .scroll { overflow: auto; max-height: 68vh; }
    .table-list { display: grid; grid-template-columns: minmax(320px, 38%) 1fr; gap: 14px; align-items: start; }
    .list-row { width: 100%; text-align: left; display: grid; gap: 4px; border: 1px solid var(--line); background: var(--panel); color: var(--text); padding: 10px; border-radius: 8px; }
    .list-row.active { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .list-row-title { display: flex; justify-content: space-between; gap: 10px; font-weight: 700; }
    .chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--soft); }
    .badge.good { color: #06130b; background: var(--good); border-color: var(--good); }
    .badge.warn { color: #1b1203; background: var(--accent-2); border-color: var(--accent-2); }
    .badge.bad { color: #190707; background: var(--danger); border-color: var(--danger); }
    .badge.info { color: #071022; background: var(--info); border-color: var(--info); }
    .badge.purple { color: #170b22; background: var(--purple); border-color: var(--purple); }
    .badge.empty { color: var(--muted); background: #111317; border-color: var(--line); }
    .mono { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; font-size: 12px; }
    .domain-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .domain-card { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: var(--panel-2); min-height: 120px; }
    .domain-card h3 { margin: 0 0 8px; font-size: 14px; }
    .domain-card p { color: var(--muted); margin: 0 0 9px; }
    .lens-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .lens-card { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: var(--panel-2); display: grid; gap: 9px; }
    .lens-card h3 { margin: 0; font-size: 15px; }
    .lens-card p { margin: 0; color: var(--soft); }
    .lens-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    .step-list { display: grid; gap: 10px; counter-reset: steps; }
    .step-item { display: grid; grid-template-columns: 34px 1fr; gap: 10px; align-items: start; }
    .step-item::before { counter-increment: steps; content: counter(steps); display: grid; place-items: center; width: 28px; height: 28px; border-radius: 8px; background: var(--accent); color: #05110f; font-weight: 800; }
    .signal-row { display: grid; grid-template-columns: 220px 150px 1fr; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .signal-row:last-child { border-bottom: 0; }
    .compare-grid { display: grid; gap: 14px; grid-template-columns: 320px 1fr; align-items: start; }
    .field-grid { display: grid; grid-template-columns: 190px 1fr; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .field-grid div { padding: 8px 10px; border-bottom: 1px solid var(--line); }
    .field-grid div:nth-child(odd) { color: var(--muted); background: #15181d; }
    .field-grid div:nth-last-child(-n+2) { border-bottom: 0; }
    .column-cell { min-width: 132px; }
    .cell-same { color: var(--soft); }
    .cell-diff { color: #ffe3ad; background: #251b0c; }
    .cell-missing { color: #ffb8b8; background: #241010; }
    .cell-empty { color: var(--muted); }
    .split-list { columns: 2; column-gap: 24px; }
    .source-path { color: var(--muted); overflow-wrap: anywhere; }
    .hidden { display: none !important; }
    @media (max-width: 1100px) {
      .grid.cols-4, .grid.cols-3, .domain-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .lens-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .signal-row { grid-template-columns: 1fr; }
      .table-list, .compare-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 680px) {
      header, nav.toolbar, main { padding-left: 12px; padding-right: 12px; }
      .grid.cols-4, .grid.cols-3, .grid.cols-2, .domain-grid, .lens-grid { grid-template-columns: 1fr; }
      h1 { font-size: 20px; }
      .metric .value { font-size: 24px; }
      .split-list { columns: 1; }
      th, td { padding: 7px; }
    }
  </style>
</head>

      const present = values.filter(Boolean);
      if (present.length === 0) return 'cell-missing';
      const sigs = new Set(present.map(c => `${c.dataType}|${c.nullable}`));
      return sigs.size <= 1 ? 'cell-same' : 'cell-diff';
    }

    function initControls() {
      document.getElementById('headerMeta').innerHTML = [
        `${DATA.contexts.length} source contexts`,
        `${allTableNames.length} unique tables`,
        `${DATA.tables.length} table pages`,
        `Generated ${escapeHtml(DATA.generatedAt)}`
      ].map(x => `<span>${x}</span>`).join('');

      tabsEl.innerHTML = tabDefs.map(([id, label]) => `<button class="tab-btn ${state.tab === id ? 'active' : ''}" data-tab="${id}">${label}</button>`).join('');
      tabsEl.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => { state.tab = btn.dataset.tab; render(); }));

      tableSelect.innerHTML = allTableNames.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('');
      tableSelect.value = state.selectedTable;
      tableSelect.addEventListener('change', () => { state.selectedTable = tableSelect.value; render(); });

      const options = DATA.contexts.map(c => `<option value="${escapeHtml(c.id)}">${escapeHtml(c.id)}</option>`).join('');
      contextA.innerHTML = options;
      contextB.innerHTML = options;
      contextA.value = state.contextA;
      contextB.value = state.contextB;
      contextA.addEventListener('change', () => { state.contextA = contextA.value; render(); });
      contextB.addEventListener('change', () => { state.contextB = contextB.value; render(); });

      searchBox.value = state.search;
      searchBox.addEventListener('input', () => { state.search = searchBox.value; render(); });
      renderContextFilters();
    }

    function renderContextFilters() {
      filtersEl.innerHTML = DATA.contexts.map(c => `
        <label class="check-chip">
          <input type="checkbox" data-context="${escapeHtml(c.id)}" ${state.activeContexts.has(c.id) ? 'checked' : ''} />
          <span>${escapeHtml(c.label)}</span>
        </label>
      `).join('') + `<button class="small-btn" id="allContexts">All</button>`;
      filtersEl.querySelectorAll('input').forEach(input => input.addEventListener('change', () => {
        if (input.checked) state.activeContexts.add(input.dataset.context);
        else state.activeContexts.delete(input.dataset.context);
        if (state.activeContexts.size === 0) state.activeContexts.add(input.dataset.context);
        renderContextFilters();
        render();
      }));
      document.getElementById('allContexts').addEventListener('click', () => { state.activeContexts = new Set(DATA.contexts.map(c => c.id)); renderContextFilters(); render(); });
    }

    function render() {
      [...tabsEl.querySelectorAll('button')].forEach(btn => btn.classList.toggle('active', btn.dataset.tab === state.tab));
      tableSelect.value = state.selectedTable;
      contextA.value = state.contextA;
      contextB.value = state.contextB;
      if (state.tab === 'sense') renderSense();
      if (state.tab === 'overview') renderOverview();
      if (state.tab === 'browser') renderBrowser();
      if (state.tab === 'compare') renderCompare();
      if (state.tab === 'glossary') renderGlossary();
      if (state.tab === 'raw') renderRaw();
    }

    function renderSense() {
      const wktTables = tablesWithAnyColumns(['WKT']);
      const sizeTables = tablesWithAnyColumns(['EstimatedLength','EstimatedWidth','EstimatedDepth','EstimatedQuantity','ActualQuantity','RemainingQuantity','Area']);
      const spatialPages = tableContextCountWithAnyColumns(['WKT','SpatialInfo','ChainageFrom','ChainageTo']);
      const signalRows = SIGNALS.map(s => {
        const tables = tablesWithAnyColumns(s.columns);

          <div><strong>${escapeHtml(s.title)}</strong><div class="text-muted">${pageCount} table/context pages</div></div>
          <div class="chips">${s.columns.map(code).join(' ')}</div>
          <div><p class="note">${escapeHtml(s.why)}</p><p class="text-muted">${tables.slice(0, 12).map(code).join(' ')}${tables.length > 12 ? ` <span class="text-muted">+${tables.length - 12} more</span>` : ''}</p></div>
        </div>`;
      }).join('');
      const lensCards = DATA_LENSES.map(lens => `
        <div class="lens-card">
          <h3>${escapeHtml(lens.title)}</h3>

          <div><div class="lens-label">Use it for</div><p>${escapeHtml(lens.use)}</p></div>
          <div><div class="lens-label">Cluster by</div><div class="chips">${columnChips(lens.cluster)}</div></div>
          <div><div class="lens-label">Tables</div><div class="chips">${tableChips(lens.tables)}</div></div>
        </div>
      `).join('');
      const grainRows = [
        { level: 'Source context', grain: 'One source catalog/context such as asset_vision_vsm_gen7. Treat it as environment/contract context until confirmed.', chips: DATA.contexts.map(c => code(c.id)).join(' ') },
        { level: 'Master entity', grain: 'Asset or resource master records. These are useful dimensions but not necessarily one physical location or one problem.', chips: tableChips(['asset','resource']) },
        { level: 'Spatial segment/location', grain: 'Location rows or v-prefixed WKT exports. Use for maps, route clustering, and chainage analysis.', chips: tableChips(['assetlocation','vassetlocation','vjob','vinspection','vmodule']) },
        { level: 'Operational fact', grain: 'Jobs, inspections, capital works, and modules. These are the best starting grains for analysis.', chips: tableChips(['job','vjob','inspection','vinspection','capitalwork','module']) },
        { level: 'Child/detail row', grain: 'Tasks, attributes, form fields, photos, comments, resource lines, timesheet lines, and job-asset links.', chips: tableChips(['capitalworktask','assetattribute','formfield','photo','jobcomment','plannedresourceitem','timesheetitem','jobasset']) },
        { level: 'Event/history row', grain: 'Status, workflow, audit, and export watermark rows. Use for lifecycle and freshness analysis.', chips: tableChips(['workflowstatus','vworkflowstatus','inspectionstatus','assetaudit','exportdate','exportdatelog']) }
      ].map(row => `<tr><td><strong>${escapeHtml(row.level)}</strong></td><td>${escapeHtml(row.grain)}</td><td>${row.chips}</td></tr>`).join('');
      app.innerHTML = `
        <section class="grid cols-4">
          <div class="panel metric"><div class="value">${DATA.contexts.length}</div><div class="label">source contexts</div></div>
          <div class="panel metric"><div class="value">${allTableNames.length}</div><div class="label">unique table names</div></div>
          <div class="panel metric"><div class="value">${wktTables.length}</div><div class="label">tables with WKT geometry</div></div>
          <div class="panel metric"><div class="value">${sizeTables.length}</div><div class="label">tables with size/quantity fields</div></div>
        </section>
        <section class="panel" style="margin-top:14px">
          <div class="panel-header"><h2>What This Dataset Is</h2><span class="badge warn">Schema-derived read</span></div>
          <div class="panel-body grid cols-2">
            <div>
              <p class="note">This is not one simple table. It is a set of Asset Vision source extracts across multiple source contexts. The useful mental model is: asset master data plus operational facts such as jobs, inspections, capital works, modules, workflow/status history, resource/time/cost lines, photos, form fields, and spatial exports.</p>
              <p class="note">The metadata does not include row counts, sample values, keys, or confirmed business definitions. So the row grain below is inferred from table and column names and should be validated against actual Databricks rows before building a production model.</p>
            </div>
            <div class="callout">
              <strong>Best starting table for danger-area work:</strong> use ${code('vjob')} where available, then fall back to ${code('job')}. It has hazard/activity labels, priority, made-safe state, due/completed dates, size fields such as ${code('EstimatedLength')}, ${code('EstimatedWidth')}, ${code('EstimatedDepth')}, and map fields such as ${code('WKT')} or road chainage.
            </div>
          </div>
        </section>
        <section class="panel" style="margin-top:14px">
          <div class="panel-header"><h2>Analysis Lenses</h2><span class="text-muted">Pick the fact grain before looking at columns</span></div>
          <div class="panel-body"><div class="lens-grid">${lensCards}</div></div>
        </section>
        <section class="panel" style="margin-top:14px">
          <div class="panel-header"><h2>Granularity Ladder</h2><span class="text-muted">${spatialPages} pages have spatial or linear-location fields</span></div>
          <div class="scroll"><table><thead><tr><th>Level</th><th>What one row probably represents</th><th>Relevant tables</th></tr></thead><tbody>${grainRows}</tbody></table></div>
        </section>

          <div class="panel-header"><h2>Clusterable Signals</h2><span class="text-muted">What can be grouped or scored from this schema</span></div>
          <div class="panel-body">${signalRows}</div>
        </section>
        <section class="panel" style="margin-top:14px">
          <div class="panel-header"><h2>Practical Clustering Paths</h2></div>
          <div class="panel-body">
            <div class="step-list">
              <div class="step-item"><div><strong>Danger heatmap</strong><p class="note">Start with ${code('vjob')}: cluster by WKT or chainage, then weight by priority, made-safe state, remaining/estimated quantity, and estimated length/width/depth.</p></div></div>
              <div class="step-item"><div><strong>Repeated asset problems</strong><p class="note">Join or group jobs/inspections back to ${code('AssetID')}, ${code('AssetCode')}, asset type, classification, condition, and road section.</p></div></div>
              <div class="step-item"><div><strong>Backlog and lifecycle</strong><p class="note">Use due/scheduled/completed dates plus ${code('workflowstatus')} or ${code('inspectionstatus')} to cluster delayed, incomplete, or repeatedly reassigned work.</p></div></div>
              <div class="step-item"><div><strong>Cost and effort hotspots</strong><p class="note">Use ${code('EstimatedCost')}, ${code('ActualCost')}, resource/timesheet quantities, and planned resource cost to find high-effort locations or work types.</p></div></div>
            </div>
          </div>
        </section>`;
      app.querySelectorAll('[data-pick-table]').forEach(btn => btn.addEventListener('click', () => { state.selectedTable = btn.dataset.pickTable; state.tab = 'compare'; render(); }));
    }

    function renderOverview() {
      const totalColumns = DATA.tables.reduce((sum, t) => sum + t.columnCount, 0);
      const base = 'asset_vision_ven_gen7';
      const diffRows = DATA.contexts.map(c => {
        const diff = schemaDiff(base, c.id);
        const zero = zeroColumnTables(c.id);
        return `<tr>
          <td>${code(c.id)}</td>
          <td>${escapeHtml(c.catalog)}</td>
          <td>${contextTables(c.id).size}</td>
          <td>${totalColumnsForContext(c.id)}</td>
          <td>${zero.length}</td>
          <td>${diff.extra.length ? diff.extra.map(code).join(' ') : '<span class="text-muted">None</span>'}</td>
          <td>${diff.missing.length ? diff.missing.map(code).join(' ') : '<span class="text-muted">None</span>'}</td>
          <td>${diff.changed.length}</td>
        </tr>`;
      }).join('');
      const identical = DATA.contexts.filter(c => c.id !== base && schemaDiff(base, c.id).extra.length === 0 && schemaDiff(base, c.id).missing.length === 0 && schemaDiff(base, c.id).changed.length === 0).map(c => c.id);
      const domainCards = DOMAIN_GROUPS.map(g => `
        <div class="domain-card">
          <h3>${escapeHtml(g.title)}</h3>
          <p>${escapeHtml(g.text)}</p>
          <div class="chips">${g.tables.filter(t => tablesByName.has(t)).map(t => `<button class="small-btn" data-pick-table="${escapeHtml(t)}">${escapeHtml(t)}</button>`).join('')}</div>
        </div>`).join('');
      app.innerHTML = `
        <section class="grid cols-4">
          <div class="panel metric"><div class="value">${DATA.contexts.length}</div><div class="label">Asset Vision source contexts</div></div>
          <div class="panel metric"><div class="value">${allTableNames.length}</div><div class="label">Unique table names</div></div>
          <div class="panel metric"><div class="value">${DATA.tables.length}</div><div class="label">Documented table/context pages</div></div>
          <div class="panel metric"><div class="value">${totalColumns}</div><div class="label">Documented column entries</div></div>
        </section>
        <section class="panel" style="margin-top:14px">
          <div class="panel-header"><h2>Plain-English Read</h2><span class="badge warn">Metadata-derived</span></div>
          <div class="panel-body grid cols-2">
            <div>
              <p class="note">Asset Vision is represented here as several external SQL Server source catalogs, not one canonical schema. Based on the table and column names, the data covers asset registers, inspections, jobs/work orders, capital works, resources, timesheets, modules, workflow status, photos, spatial exports, and export/control tables.</p>
              <p class="note">The context names such as ${code('ven_gen7')}, ${code('vns_gen7')}, ${code('vnz_gen7')}, and ${code('vsm_gen7')} are catalog-derived source contexts. The docs do not prove their client/contract mapping; ${code('dbo')} is only the SQL Server source schema.</p>
            </div>
            <div class="callout">
              <strong>Fast difference read:</strong> ${identical.length ? `${identical.map(code).join(', ')} match ${code(base)} exactly by documented table and column signatures. ` : ''}${code('asset_vision_vnz_gen7')} differs mainly because ${code('summarycheck')} has zero supplied columns. ${code('asset_vision_ven_vicroads')} adds ${code('laneaccess')} and ${code('sqlserverversions')}. ${code('asset_vision_ven_rms')} is structurally different and has many documented zero-column objects. ${code('asset_vision_ven_rms_old')} is partial.
            </div>
          </div>
        </section>
        <section class="panel" style="margin-top:14px">
          <div class="panel-header"><h2>Data Domains</h2></div>
          <div class="panel-body"><div class="domain-grid">${domainCards}</div></div>
        </section>
        <section class="panel" style="margin-top:14px">
          <div class="panel-header"><h2>Context Differences Against ${escapeHtml(base)}</h2><span class="text-muted">Column signature = name + type + nullable order</span></div>
          <div class="scroll"><table>
            <thead><tr><th>Context</th><th>Catalog</th><th>Tables</th><th>Columns</th><th>0-col pages</th><th>Extra tables</th><th>Missing tables</th><th>Changed shared tables</th></tr></thead>
            <tbody>${diffRows}</tbody>
          </table></div>
        </section>
        <section class="panel" style="margin-top:14px">
          <div class="panel-header"><h2>Source Context Notes</h2></div>
          <div class="scroll"><table>
            <thead><tr><th>Context</th><th>Mapping caveat</th><th>Source notes</th><th>Catalog page</th></tr></thead>
            <tbody>${DATA.contexts.map(c => {
              const notes = contextNotes(c);
              return `<tr><td>${code(c.id)}</td><td>${escapeHtml(c.clientContractMapping)}</td><td>${notes.length ? notes.map(escapeHtml).join('<br>') : '<span class="text-muted">No extra notes</span>'}</td><td class="source-path">${escapeHtml(c.catalogPath)}</td></tr>`;
            }).join('')}</tbody>
          </table></div>
        </section>`;
      app.querySelectorAll('[data-pick-table]').forEach(btn => btn.addEventListener('click', () => { state.selectedTable = btn.dataset.pickTable; state.tab = 'compare'; render(); }));
    }

    function renderBrowser() {
      const names = filteredTableNames();
      const list = names.map(name => {
        const versions = (tablesByName.get(name) || []).filter(t => state.activeContexts.has(t.context));
        const counts = versions.map(v => v.columnCount);
        const [label, desc] = explain(name);
        const min = counts.length ? Math.min(...counts) : 0;
        const max = counts.length ? Math.max(...counts) : 0;
        return `<button class="list-row ${state.selectedTable === name ? 'active' : ''}" data-table-name="${escapeHtml(name)}">
          <span class="list-row-title"><span>${escapeHtml(name)}</span><span class="badge ${min === max ? 'good' : 'warn'}">${min === max ? `${max}` : `${min}-${max}`} cols</span></span>
          <span class="text-muted">${escapeHtml(label)}</span>
          <span>${escapeHtml(desc)}</span>
          <span class="chips">${versions.map(v => `<span class="badge">${escapeHtml(contextsById.get(v.context)?.label || v.context)}</span>`).join('')}</span>
        </button>`;
      }).join('');
      app.innerHTML = `<section class="table-list">
        <div class="panel"><div class="panel-header"><h2>Tables</h2><span class="text-muted">${names.length} shown</span></div><div class="panel-body grid">${list || '<p class="text-muted">No matching tables.</p>'}</div></div>
        <div>${renderTableDetail(state.selectedTable)}</div>
      </section>`;
      app.querySelectorAll('[data-table-name]').forEach(btn => btn.addEventListener('click', () => { state.selectedTable = btn.dataset.tableName; renderBrowser(); }));
      app.querySelectorAll('[data-open-compare]').forEach(btn => btn.addEventListener('click', () => { state.selectedTable = btn.dataset.openCompare; state.tab = 'compare'; render(); }));
    }

    function renderTableDetail(tableName) {
      const versions = DATA.contexts.map(c => tableFor(c.id, tableName)).filter(Boolean);
      const [label, desc] = explain(tableName);
      const contextCards = DATA.contexts.map(c => {
        const t = tableFor(c.id, tableName);
        if (!t) return `<tr><td>${code(c.id)}</td><td>${presenceBadge(null)}</td><td></td><td></td><td></td></tr>`;
        return `<tr><td>${code(c.id)}</td><td>${presenceBadge(t)}</td><td>${cellCode(t.fullName)}</td><td>${escapeHtml(t.domain)}</td><td class="source-path">${escapeHtml(t.path)}</td></tr>`;
      }).join('');
      return `<div class="panel">
        <div class="panel-header"><h2>${escapeHtml(tableName)}</h2><button class="small-btn" data-open-compare="${escapeHtml(tableName)}">Compare this table</button></div>
        <div class="panel-body">
          <h3>${escapeHtml(label)}</h3>
          <p class="note">${escapeHtml(desc)}</p>
          <div class="chips" style="margin-bottom:10px">${versions.map(t => `<span class="badge ${t.columnCount === 0 ? 'empty' : 'info'}">${escapeHtml(t.context)}: ${t.columnCount}</span>`).join('')}</div>
        </div>
        <div class="scroll"><table><thead><tr><th>Context</th><th>Status</th><th>Full name</th><th>Domain</th><th>Source page</th></tr></thead><tbody>${contextCards}</tbody></table></div>
      </div>`;
    }

    function renderCompare() {
      const tableName = state.selectedTable;
      const contextIds = activeContextIds();
      const unionColumns = allColumnNamesForTable(tableName);
      const lookups = new Map(contextIds.map(id => [id, columnLookup(tableFor(id, tableName))]));
      const rows = unionColumns.map(col => {
        const values = contextIds.map(id => lookups.get(id).get(col));
        const cls = columnCellClass(values);
        return `<tr><td>${code(col)}</td>${contextIds.map(id => {
          const c = lookups.get(id).get(col);
          if (!c) return `<td class="column-cell cell-missing">Missing</td>`;
          return `<td class="column-cell ${cls}">${cellCode(c.dataType)}<br><span class="text-muted">${escapeHtml(c.nullable)}</span></td>`;
        }).join('')}</tr>`;
      }).join('');
      const summary = DATA.contexts.map(c => {
        const t = tableFor(c.id, tableName);
        return `<tr><td>${code(c.id)}</td><td>${presenceBadge(t)}</td><td>${t ? cellCode(t.fullName) : ''}</td></tr>`;
      }).join('');
      const diff = schemaDiff(state.contextA, state.contextB);
      const pairRows = diff.changed.map(name => `<tr><td>${code(name)}</td><td>${tableFor(state.contextA, name)?.columnCount ?? 'Missing'}</td><td>${tableFor(state.contextB, name)?.columnCount ?? 'Missing'}</td><td><button class="small-btn" data-compare-table="${escapeHtml(name)}">Open</button></td></tr>`).join('');
      app.innerHTML = `<section class="compare-grid">
        <div class="panel">
          <div class="panel-header"><h2>Selected Table</h2></div>
          <div class="panel-body">
            <h3>${escapeHtml(tableName)}</h3>
            <p class="note">${escapeHtml(explain(tableName)[1])}</p>
          </div>
          <div class="scroll"><table><thead><tr><th>Context</th><th>Status</th><th>Full name</th></tr></thead><tbody>${summary}</tbody></table></div>
        </div>
        <div class="grid">
          <div class="panel">
            <div class="panel-header"><h2>Column Alignment</h2><span class="text-muted">${unionColumns.length} unique columns</span></div>
            <div class="scroll"><table><thead><tr><th>Column</th>${contextIds.map(id => `<th>${escapeHtml(contextsById.get(id)?.label || id)}</th>`).join('')}</tr></thead><tbody>${rows || '<tr><td colspan="8" class="text-muted">No columns documented for selected active contexts.</td></tr>'}</tbody></table></div>
          </div>
          <div class="panel">
            <div class="panel-header"><h2>Pairwise Context Difference</h2><span class="text-muted">${escapeHtml(state.contextA)} vs ${escapeHtml(state.contextB)}</span></div>
            <div class="panel-body grid cols-3">
              <div><h3>Only in ${escapeHtml(state.contextB)}</h3><p class="split-list">${diff.extra.length ? diff.extra.map(code).join('<br>') : '<span class="text-muted">None</span>'}</p></div>
              <div><h3>Missing from ${escapeHtml(state.contextB)}</h3><p class="split-list">${diff.missing.length ? diff.missing.map(code).join('<br>') : '<span class="text-muted">None</span>'}</p></div>
              <div><h3>Changed shared tables</h3><p class="text-muted">${diff.changed.length} tables differ by column signature.</p></div>
            </div>
            <div class="scroll"><table><thead><tr><th>Changed table</th><th>${escapeHtml(state.contextA)} cols</th><th>${escapeHtml(state.contextB)} cols</th><th></th></tr></thead><tbody>${pairRows || '<tr><td colspan="4" class="text-muted">No changed shared tables.</td></tr>'}</tbody></table></div>
          </div>
        </div>
      </section>`;
      app.querySelectorAll('[data-compare-table]').forEach(btn => btn.addEventListener('click', () => { state.selectedTable = btn.dataset.compareTable; tableSelect.value = state.selectedTable; renderCompare(); }));
    }

    function renderGlossary() {
      const cols = filteredColumns();
      app.innerHTML = `<section class="panel">
        <div class="panel-header"><h2>Column Glossary</h2><span class="text-muted">${cols.length} columns shown</span></div>
        <div class="scroll"><table>
          <thead><tr><th>Column</th><th>Occurrences</th><th>Data types</th><th>Tables</th><th>Contexts</th><th>Examples</th></tr></thead>

      </section>`;
    }

    function renderRaw() {
      const contextId = state.contextA;
      const names = [...contextTables(contextId).keys()].sort();
      const currentName = names.includes(state.selectedTable) ? state.selectedTable : names[0];
      const t = tableFor(contextId, currentName);
      const identityRows = Object.entries(t.identity || {}).map(([k,v]) => `<div>${escapeHtml(k)}</div><div>${cellCode(v) || escapeHtml(v)}</div>`).join('');
      const contextRows = Object.entries(t.contextDetails || {}).map(([k,v]) => `<div>${escapeHtml(k)}</div><div>${cellCode(v) || escapeHtml(v)}</div>`).join('');
      const colRows = (t.columns || []).map(c => `<tr><td>${c.ordinal + 1}</td><td>${code(c.name)}</td><td>${code(c.dataType)}</td><td>${escapeHtml(c.nullable)}</td><td>${escapeHtml(c.notes)}</td></tr>`).join('');
      app.innerHTML = `<section class="grid">
        <div class="panel">
          <div class="panel-header"><h2>Raw Table Detail</h2><div class="toolbar-row"><select id="rawTableSelect">${names.map(n => `<option value="${escapeHtml(n)}" ${n === currentName ? 'selected' : ''}>${escapeHtml(n)}</option>`).join('')}</select></div></div>

          <div class="panel"><div class="panel-header"><h3>Context</h3></div><div class="panel-body"><div class="field-grid">${contextRows}</div></div></div>
        </div>
        <div class="panel"><div class="panel-header"><h3>Columns</h3><span class="text-muted">${t.columns.length} rows</span></div><div class="scroll"><table><thead><tr><th>#</th><th>Column</th><th>Data type</th><th>Nullable</th><th>Notes</th></tr></thead><tbody>${colRows || '<tr><td colspan="5" class="text-muted">No supplied columns documented.</td></tr>'}</tbody></table></div></div>
      </section>`;
      document.getElementById('rawTableSelect').addEventListener('change', e => { state.selectedTable = e.target.value; tableSelect.value = state.selectedTable; renderRaw(); });
    }

    initControls();
    render();
  </script>
</body>
</html>
